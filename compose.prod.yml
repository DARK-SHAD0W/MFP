services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mfp-user
      POSTGRES_PASSWORD: mfp-pswrd
      POSTGRES_DB: mfp-db
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - mfp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    #build:
    #  context: ./server
    image: ghcr.io/dark-shad0w/mfp/server:main
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: mfp-user
      DB_PASSWORD: mfp-pswrd
      DB_NAME: mfp-db
    ports:
      - "3000:3000"
    volumes:
      - ./server/src:/app/src
    networks:
      - mfp-network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5

  client:
    #build:
    #  context: ./client
    image: ghcr.io/dark-shad0w/mfp/client:main
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./client/src:/app/src
    networks:
      - mfp-network
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:5173 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-data:

networks:
  mfp-network:
    driver: bridge
