services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_PORT}:${DB_CONTAINER_PORT}"
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - mfp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    #build:
    #  context: ./server
    image: ghcr.io/dark-shad0w/mfp/server:v${APP_VERSION}
    restart: unless-stopped
    environment:
      PORT: ${SERVER_CONTAINER_PORT}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_CONTAINER_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
    ports:
      - "${SERVER_PORT}:${SERVER_CONTAINER_PORT}"
    networks:
      - mfp-network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:${SERVER_CONTAINER_PORT}/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5

  client:
    #build:
    #  context: ./client
    image: ghcr.io/dark-shad0w/mfp/client:v${APP_VERSION}
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT}:${CLIENT_PROD_CONTAINER_PORT}"
    networks:
      - mfp-network
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:${CLIENT_PROD_CONTAINER_PORT} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-data:

networks:
  mfp-network:
    driver: bridge