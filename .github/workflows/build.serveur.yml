# Flux de travail pour la construction et l'envoi de l'image Docker Serveur
# Construit et pousse automatiquement l'image serveur lorsque le code change

name: Build and push Server Docker image

# Conditions de déclenchement
on:
  push:
    branches: ['main', 'dev']  # Exécuter sur les branches main et dev
    paths:
      - 'server/**'  # Ne s'exécuter que si les fichiers du dossier server/ ont changé
      - '.github/workflows/build.serveur.yml'  # Ou si ce fichier de flux de travail a changé

# Variables d'environnement utilisées dans le flux de travail
env:
  REGISTRY: ghcr.io  # Registre de conteneurs GitHub
  IMAGE_NAME: ${{ github.repository }}/server  # Nom de l'image : propriétaire/repo/server

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      # Étape 1 : Récupérer le code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Étape 2 : Se connecter à Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Étape 3 : Se connecter au registre de conteneurs GitHub
      - name: Log in to Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Étape 4 : Récupérer la version pour le semantic versioning
      - name: Read version
        id: version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      # Étape 5 : Générer les étiquettes d'image
      # Cela crée plusieurs étiquettes pour la même image :
      # - Nom de la branche (main, dev)
      # - SHA du commit (main-a1b2c3d ou dev-x9y8z7w)
      # - Numéro de version (v1.0.0)
      # - « latest » (uniquement sur la branche main)
      # - « dev » (uniquement sur la branche dev)
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch  # Étiquette avec le nom de la branche (main/dev)
            type=sha,prefix={{branch}}-  # Étiquette avec le SHA du commit (main-a1b2c3d)
            type=raw,value=v${{ steps.version.outputs.VERSION }}  # Numéro de version (v1.0.0)
            type=raw,value=latest,enable={{is_default_branch}}  # Ajouter l'étiquette « latest » uniquement sur la branche main
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}  # Ajouter l'étiquette « dev » uniquement sur la branche dev

      # Étape 6 : Construire et envoyer l'image Docker
      # Prend le Dockerfile du dossier server/ et l'envoie au registre avec toutes les étiquettes
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: ./server  # Utiliser le Dockerfile dans le dossier server/
          push: true  # Envoyer au registre (ne pas juste construire localement)
          tags: ${{ steps.meta.outputs.tags }}  # Utiliser les étiquettes générées à l'étape précédente
          labels: ${{ steps.meta.outputs.labels }}  # Ajouter des étiquettes de métadonnées

      # Étape 7 : Créer une signature de sécurité (prouve que GitHub Actions a construit cette image)
      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  # Job 2 : Tester l'API avec Bruno
  test-bruno:
    runs-on: ubuntu-latest
    needs: build-and-push-image

    steps:
      # Étape 1 : Récupérer le code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Étape 2 : Se connecter à Docker Hub pour puller l'image
      - name: Log in to Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Étape 3 : Puller et lancer le serveur Docker
      - name: Pull and run server container
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main-${{ github.sha }}"
          IMAGE_LOWER=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          docker pull "$IMAGE_LOWER"
          docker run -d --name mfp-server -p 3000:3000 -e NODE_ENV=test "$IMAGE_LOWER"

      # Étape 4 : Installer pnpm
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      # Étape 5 : Installer Bruno CLI
      - name: Install Bruno CLI
        run: pnpm install -g @usebruno/cli

      # Étape 6 : Attendre que le serveur soit prêt
      - name: Wait for server to be ready
        run: |
          echo "Waiting for server to be ready..."
          for i in {1..30}; do
            if curl -s http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "✓ Server is ready!"
              exit 0
            fi
            echo "Attempt $i/30 - Server not ready yet..."
            sleep 2
          done
          echo "✗ Server failed to start"
          docker logs mfp-server
          exit 1

      # Étape 7 : Exécuter les tests Bruno
      - name: Run Bruno API tests
        working-directory: ./server/bruno-tests
        run: bru run --reporter-json results.json --reporter-html results.html

      # Étape 8 : Upload les rapports
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bruno-test-results
          path: |
            server/bruno-tests/results.json
            server/bruno-tests/results.html

      # Étape 9 : Afficher les logs du serveur si erreur
      - name: Show server logs on failure
        if: failure()
        run: docker logs mfp-server
