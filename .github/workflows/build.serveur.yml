# Flux de travail pour la construction et l'envoi de l'image Docker Serveur
# Construit et pousse automatiquement l'image serveur lorsque le code change

name: Build and push Server Docker image

# Conditions de déclenchement
on:
  push:
    branches: ['main', 'dev']  # Exécuter sur les branches main et dev
    paths:
      - 'server/**'  # Ne s'exécuter que si les fichiers du dossier server/ ont changé
      - '.github/workflows/build.serveur.yml'  # Ou si ce fichier de flux de travail a changé

# Variables d'environnement utilisées dans le flux de travail
env:
  REGISTRY: ghcr.io  # Registre de conteneurs GitHub
  IMAGE_NAME: ${{ github.repository }}/server  # Nom de l'image (sera converti en lowercase)

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      # Étape 1 : Récupérer le code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Étape 2 : Se connecter à Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Étape 3 : Se connecter au registre de conteneurs GitHub
      - name: Log in to Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Étape 4 : Récupérer la version pour le semantic versioning
      - name: Read version
        id: version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      # Étape 5 : Générer les étiquettes d'image
      # Cela crée plusieurs étiquettes pour la même image :
      # - Nom de la branche (main, dev)
      # - SHA du commit (main-a1b2c3d ou dev-x9y8z7w)
      # - Numéro de version (v1.0.0)
      # - « latest » (uniquement sur la branche main)
      # - « dev » (uniquement sur la branche dev)
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=v${{ steps.version.outputs.VERSION }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}

      # Étape 6 : Construire et envoyer l'image Docker
      # Prend le Dockerfile du dossier server/ et l'envoie au registre avec toutes les étiquettes
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: ./server  # Utiliser le Dockerfile dans le dossier server/
          push: true  # Envoyer au registre (ne pas juste construire localement)
          tags: ${{ steps.meta.outputs.tags }}  # Utiliser les étiquettes générées à l'étape précédente
          labels: ${{ steps.meta.outputs.labels }}  # Ajouter des étiquettes de métadonnées

      # Étape 7 : Créer une signature de sécurité (prouve que GitHub Actions a construit cette image)
      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  # Job 2 : Tester les tests unitaires avec Jest (lié au build)
  test-jest:
    runs-on: ubuntu-latest
    needs: build-and-push-image

    steps:
      # Étape 1 : Récupérer le code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Étape 2 : Installer Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Étape 3 : Installer les dépendances
      - name: Install dependencies
        working-directory: ./server
        run: npm ci

      # Étape 4 : Exécuter les tests Jest
      - name: Run Jest tests
        working-directory: ./server
        run: npx jest --coverage

      # Étape 6 : Upload les résultats des tests
      - name: Upload Jest coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jest-coverage
          path: server/coverage

  # Job 3 : Tester l'API avec Bruno (indépendant, construit l'image localement)
  test-bruno:
    runs-on: ubuntu-latest

    steps:
      # Étape 1 : Récupérer le code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Étape 2 : Construire et lancer serveur + DB localement
      - name: Build and start server with database
        run: docker compose -f compose.test.yml up -d --build

      # Étape 3 : Installer Bruno CLI
      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli

      # Étape 5 : Attendre que le serveur soit prêt
      - name: Wait for server to be ready
        run: |
          for i in {1..60}; do
            if curl -s http://localhost:3000/health > /dev/null 2>&1; then
              echo "Server is ready!"
              exit 0
            fi
            echo "Waiting for server... ($i/60)"
            sleep 2
          done
          echo "Server failed to start"
          docker compose -f compose.test.yml logs server
          exit 1

      # Étape 6 : Exécuter les tests Bruno
      - name: Run Bruno API tests
        working-directory: ./server/bruno-tests
        run: bru run --reporter-json results.json --reporter-html results.html

      # Étape 7 : Upload les rapports
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bruno-test-results
          path: |
            server/bruno-tests/results.json
            server/bruno-tests/results.html

      # Étape 8 : Afficher les logs du serveur si erreur
      - name: Show server logs on failure
        if: failure()
        run: docker compose -f compose.test.yml logs server
