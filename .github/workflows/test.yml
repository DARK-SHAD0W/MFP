# Workflow de tests automatiques
# Exécute les tests unitaires Jest et les tests API Bruno à chaque push

name: Tests

on:
  push:
    branches: ['main', 'dev']
    paths:
      - 'client/**'
      - 'server/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches: ['main', 'dev']
    paths:
      - 'client/**'
      - 'server/**'
      - '.github/workflows/test.yml'

jobs:
  # Job 0 : Détecte si le serveur ou le client a changé
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      server_changed: ${{ steps.filter.outputs.server }}
      client_changed: ${{ steps.filter.outputs.client }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            server:
              - 'server/**'
              - 'compose.test.yml'
            client:
              - 'client/**'

  # Job 1 : Lint/format check côté client
  lint-client:
    needs: detect-changes
    if: needs.detect-changes.outputs.client_changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: ./client
        run: npm ci

      - name: Run TypeScript check
        working-directory: ./client
        run: npx tsc --noEmit

      - name: Run Prettier check
        working-directory: ./client
        run: npx prettier@3 --check "src/**/*.{ts,tsx,js,jsx,css}" "vite.config.ts"

  # Job 2 : Lint/format check côté serveur (bloquant pour les tests)
  lint-server:
    needs: detect-changes
    if: needs.detect-changes.outputs.server_changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: ./server
        run: npm ci

      - name: Run TypeScript check
        working-directory: ./server
        run: npx tsc --noEmit

      - name: Run Prettier check
        working-directory: ./server
        run: npx prettier@3 --check "src/**/*.{ts,tsx,js,jsx}" "jest.config.js"

  # Job 3 : Tests unitaires Jest
  test-jest:
    needs: [detect-changes, lint-server]
    if: needs.detect-changes.outputs.server_changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./server
        run: npm ci

      - name: Run Jest tests
        working-directory: ./server
        run: npx jest --coverage

      - name: Upload Jest coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jest-coverage
          path: server/coverage

  # Job 4 : Tests API Bruno
  test-bruno:
    needs: [detect-changes, lint-server]
    if: needs.detect-changes.outputs.server_changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and start server with database
        run: docker compose -f compose.test.yml up -d --build

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli

      - name: Wait for server to be ready
        run: |
          for i in {1..60}; do
            if curl -s http://localhost:3000/health > /dev/null 2>&1; then
              echo "Server is ready!"
              exit 0
            fi
            echo "Waiting for server... ($i/60)"
            sleep 2
          done
          echo "Server failed to start"
          docker compose -f compose.test.yml logs server
          exit 1

      - name: Run Bruno API tests
        working-directory: ./server/bruno-tests
        run: bru run --reporter-json results.json --reporter-html results.html

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bruno-test-results
          path: |
            server/bruno-tests/results.json
            server/bruno-tests/results.html

      - name: Show server logs on failure
        if: failure()
        run: docker compose -f compose.test.yml logs server
