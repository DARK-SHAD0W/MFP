# Flux de travail pour la construction et l'envoi de l'image Docker Client
# Construit et pousse automatiquement l'image client lorsque le code change

name: Build and push Client Docker image

# Conditions de déclenchement
on:
  push:
    branches: ['main', 'dev']  # Exécuter sur les branches main et dev
    paths:
      - 'client/**'  # Ne s'exécuter que si les fichiers du dossier client/ ont changé
      - '.github/workflows/build.client.yml'  # Ou si ce fichier de flux de travail a changé

# Variables d'environnement utilisées dans le flux de travail
env:
  REGISTRY: ghcr.io  # Registre de conteneurs GitHub
  IMAGE_NAME: ${{ github.repository }}/client  # Nom de l'image : propriétaire/repo/client

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      # Étape 1 : Récupérer le code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Étape 2 : Linter - Valider la syntaxe du code
      - name: Run ESLint
        working-directory: ./client
        run: |
          npm install
          npm run lint --if-present || true

      # Étape 4 : Se connecter à Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Étape 5 : Se connecter au registre de conteneurs GitHub
      - name: Log in to Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Étape 6 : Récupérer la version pour le semantic versioning
      - name: Read version
        id: version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      # Étape 7 : Générer les étiquettes d'image
      # Cela crée plusieurs étiquettes pour la même image :
      # - Nom de la branche (main, dev)
      # - SHA du commit (main-a1b2c3d ou dev-x9y8z7w)
      # - Numéro de version (v1.0.0)
      # - « latest » (uniquement sur la branche main)
      # - « dev » (uniquement sur la branche dev)
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch  # Étiquette avec le nom de la branche (main/dev)
            type=sha,prefix={{branch}}-  # Étiquette avec le SHA du commit (main-a1b2c3d)
            type=raw,value=v${{ steps.version.outputs.VERSION }}  # Numéro de version (v1.0.0)
            type=raw,value=latest,enable={{is_default_branch}}  # Ajouter l'étiquette « latest » uniquement sur la branche main
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}  # Ajouter l'étiquette « dev » uniquement sur la branche dev

      # Étape 8 : Construire et envoyer l'image Docker
      # Prend le Dockerfile du dossier client/ et l'envoie au registre avec toutes les étiquettes
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: ./client  # Utiliser le Dockerfile dans le dossier client/
          push: true  # Envoyer au registre (ne pas juste construire localement)
          tags: ${{ steps.meta.outputs.tags }}  # Utiliser les étiquettes générées à l'étape précédente
          labels: ${{ steps.meta.outputs.labels }}  # Ajouter des étiquettes de métadonnées

      # Étape 9 : Créer une signature de sécurité (prouve que GitHub Actions a construit cette image)
      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
