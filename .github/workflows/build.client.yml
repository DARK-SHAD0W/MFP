# Client Docker Image Build and Push Workflow
# Automatically builds and pushes the client image when code changes

name: Build and push Client Docker image

# Trigger conditions
on:
  push:
    branches: ['main', 'dev']  # Run on main and dev branches
    paths:
      - 'client/**'  # Only run if files in client/ folder changed
      - '.github/workflows/build.client.yml'  # Or if this workflow file changed

# Environment variables used throughout the workflow
env:
  REGISTRY: ghcr.io  # GitHub Container Registry
  IMAGE_NAME: ${{ github.repository }}/client  # Image name: owner/repo/client

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      # Step 1: Get the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Login to GitHub Container Registry
      - name: Log in to Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 3: Generate image tags
      # This creates multiple tags for the same image:
      # - Branch name (main, dev)
      # - Commit SHA (main-a1b2c3d or dev-x9y8z7w)
      # - "latest" (only on main branch)
      # - "dev" (only on dev branch)
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch  # Tag with branch name (main/dev)
            type=sha,prefix={{branch}}-  # Tag with commit SHA (main-a1b2c3d)
            type=raw,value=latest,enable={{is_default_branch}}  # Add "latest" tag on main branch only
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}  # Add "dev" tag on dev branch only

      # Step 4: Build and push the Docker image
      # Takes the Dockerfile from client/ folder and pushes to registry with all tags
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: ./client  # Use Dockerfile in client/ folder
          push: true  # Push to registry (don't just build locally)
          tags: ${{ steps.meta.outputs.tags }}  # Use tags generated in previous step
          labels: ${{ steps.meta.outputs.labels }}  # Add metadata labels

      # Step 5: Create security signature (proves GitHub Actions built this image)
      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
